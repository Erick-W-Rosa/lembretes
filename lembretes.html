<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Coasul • Lembretes</title>

  <style>
    :root{
      --c-blue:#0d47a1;
      --c-orange:#ef6c00;
      --c-green:#43a047;
      --c-magenta:#ad2e8c;
      --c-yellow:#ffd53d;

      --text-light: rgba(255,255,255,.96);
      --line-light: rgba(255,255,255,.28);
      --dark:#0b1220;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: "Segoe UI", Arial, Helvetica, sans-serif;
      background: #111;
    }

    body {
      color: var(--text-light);
    }

    #app {
      width: 100vw;
      height: 100vh;
      display: grid;
      background: #111;
    }

    .layout-1 { grid-template-columns: 1fr; grid-template-rows: 1fr; }
    .layout-2 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr; }
    .layout-3 { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr; }
    .layout-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }

    .card{
      position: relative;
      padding: clamp(18px, 3vh, 42px) clamp(18px, 3vw, 48px);
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.04);
    }

    .card::before{
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 18%, rgba(255,255,255,.10), transparent 32%),
        radial-gradient(circle at 80% 85%, rgba(0,0,0,.14), transparent 30%),
        repeating-linear-gradient(
          0deg,
          rgba(255,255,255,.016) 0px,
          rgba(255,255,255,.016) 1px,
          rgba(0,0,0,.010) 2px,
          rgba(0,0,0,.010) 3px
        );
      mix-blend-mode: screen;
      opacity: .62;
    }

    .theme-blue    { background: var(--c-blue); }
    .theme-orange  { background: var(--c-orange); }
    .theme-green   { background: var(--c-green); }
    .theme-magenta { background: var(--c-magenta); }

    .topline{
      position: relative;
      z-index: 1;
      font-weight: 900;
      font-size: clamp(14px, 1.8vw, 40px);
      line-height: 1.15;
      letter-spacing: .2px;
      color: rgba(255,255,255,.96);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: clamp(6px, 1vh, 14px);
      text-shadow: 0 2px 6px rgba(0,0,0,.18);
    }

    .divider{
      position: relative;
      z-index: 1;
      height: 2px;
      width: 100%;
      background: var(--line-light);
      margin-bottom: clamp(10px, 1.8vh, 24px);
      flex: 0 0 auto;
    }

    .header{
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: clamp(10px, 1vw, 20px);
      color: var(--c-yellow);
      margin-bottom: clamp(8px, 1.5vh, 18px);
      text-shadow: 0 2px 6px rgba(0,0,0,.22);
    }

    .icon{
      font-size: clamp(28px, 3.5vw, 82px);
      line-height: 1;
      flex: 0 0 auto;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,.22));
    }

    .header-title{
      font-weight: 900;
      font-size: clamp(24px, 3.2vw, 78px);
      line-height: 1;
      letter-spacing: .2px;
    }

    .message{
      position: relative;
      z-index: 1;
      font-weight: 900;
      font-size: clamp(22px, 3vw, 74px);
      line-height: 1.16;
      color: rgba(255,255,255,.97);
      text-shadow: 0 2px 8px rgba(0,0,0,.20);
      display: -webkit-box;
      -webkit-box-orient: vertical;
      overflow: hidden;
      word-break: break-word;
    }

    .layout-1 .message { -webkit-line-clamp: 7; }
    .layout-2 .message { -webkit-line-clamp: 7; }
    .layout-3 .message { -webkit-line-clamp: 6; font-size: clamp(18px, 2.2vw, 46px); }
    .layout-4 .message { -webkit-line-clamp: 5; font-size: clamp(18px, 2.3vw, 48px); }

    .meta{
      position: relative;
      z-index: 1;
      margin-top: auto;
      padding-top: clamp(10px, 1.6vh, 24px);
      font-size: clamp(11px, .95vw, 20px);
      line-height: 1.3;
      color: rgba(255,255,255,.80);
      font-weight: 700;
      text-shadow: 0 1px 4px rgba(0,0,0,.16);
    }

    .single .topline { font-size: clamp(18px, 2vw, 46px); }
    .single .header-title { font-size: clamp(32px, 4vw, 94px); }
    .single .message { font-size: clamp(30px, 4.2vw, 100px); }

    /* ===== TELA INSTITUCIONAL QUANDO NÃO HÁ LEMBRETES ===== */
    .social-screen{
      width:100vw;
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:
        radial-gradient(circle at 15% 20%, rgba(13,71,161,.35), transparent 30%),
        radial-gradient(circle at 80% 25%, rgba(239,108,0,.30), transparent 28%),
        radial-gradient(circle at 20% 80%, rgba(67,160,71,.28), transparent 30%),
        radial-gradient(circle at 82% 78%, rgba(173,46,140,.22), transparent 28%),
        linear-gradient(135deg, #0a1220 0%, #0f1c32 35%, #11223d 100%);
      overflow:hidden;
      position:relative;
    }

    .social-screen::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,.05), transparent 45%),
        repeating-linear-gradient(
          0deg,
          rgba(255,255,255,.012) 0px,
          rgba(255,255,255,.012) 1px,
          rgba(0,0,0,.012) 2px,
          rgba(0,0,0,.012) 3px
        );
      pointer-events:none;
    }

    .social-box{
      position:relative;
      z-index:1;
      width:min(1400px, 92vw);
      min-height: min(82vh, 900px);
      border-radius: 34px;
      padding: clamp(28px, 4vh, 48px) clamp(28px, 4vw, 56px);
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.14);
      box-shadow: 0 24px 60px rgba(0,0,0,.32);
      backdrop-filter: blur(10px);
      display:flex;
      flex-direction:column;
      justify-content:space-between;
    }

    .social-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:20px;
      margin-bottom: 28px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:18px;
    }

    .brand img{
      height: clamp(50px, 5vw, 88px);
      width:auto;
      display:block;
    }

    .brand-text{
      font-size: clamp(18px, 2vw, 38px);
      font-weight: 900;
      color: rgba(255,255,255,.92);
      letter-spacing: 2px;
    }

    .social-title{
      margin-top: 18px;
      font-size: clamp(40px, 4.4vw, 92px);
      line-height: 1.02;
      font-weight: 950;
      color:#fff;
      text-shadow: 0 6px 18px rgba(0,0,0,.22);
      max-width: 950px;
    }

    .social-sub{
      margin-top: 18px;
      font-size: clamp(18px, 1.4vw, 28px);
      line-height: 1.45;
      color: rgba(255,255,255,.84);
      font-weight: 700;
      max-width: 1000px;
    }

    .social-grid{
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      margin-top: 32px;
    }

    .social-card{
      border-radius: 24px;
      padding: 22px 24px;
      color:#fff;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.08);
      min-height: 180px;
    }

    .social-card.blue{ background: linear-gradient(135deg, var(--c-blue), #1565c0); }
    .social-card.orange{ background: linear-gradient(135deg, var(--c-orange), #ff8f00); }
    .social-card.green{ background: linear-gradient(135deg, var(--c-green), #66bb6a); }

    .social-label{
      font-size: clamp(14px, 1vw, 18px);
      font-weight: 900;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: rgba(255,255,255,.82);
      margin-bottom: 12px;
    }

    .social-value{
      font-size: clamp(28px, 2.2vw, 52px);
      line-height: 1.1;
      font-weight: 950;
      margin-bottom: 10px;
    }

    .social-note{
      font-size: clamp(14px, 1vw, 20px);
      line-height: 1.35;
      font-weight: 700;
      color: rgba(255,255,255,.86);
    }

    .social-footer{
      margin-top: 28px;
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      gap:20px;
      color: rgba(255,255,255,.78);
      font-size: clamp(14px, 1vw, 18px);
      font-weight: 800;
    }

    .social-tag{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding: 12px 18px;
      border-radius: 999px;
      background: rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.14);
    }

    @media (max-width: 1200px){
      .layout-3{
        grid-template-columns: 1fr;
        grid-template-rows: repeat(3, 1fr);
      }
      .layout-3 .message{
        font-size: clamp(20px, 3vw, 42px);
      }

      .social-grid{
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 900px){
      .layout-2,
      .layout-4{
        grid-template-columns: 1fr;
        grid-template-rows: auto;
      }

      #app{
        overflow:auto;
      }

      .card{
        min-height: 50vh;
      }

      .social-box{
        width: 94vw;
        min-height: auto;
      }

      .social-top,
      .social-footer{
        flex-direction:column;
        align-items:flex-start;
      }
    }
  </style>
</head>
<body>
  <div id="app" class="layout-1"></div>

  <script>
    const TOKEN = "77ff5c89740559d0691b9946473b70ed";
    const API_PATH = "/coasul-lembretes/lembretes-coasul";
    const REFRESH_EVERY_MS = 60000;
    const PAGE_ROTATE_MS = 12000;

    const PROD_HOST  = "https://www.coasul.com.br";
    const HOMOL_HOST = "https://dev.coasul.com.br/api";
    const HOMOL_IP   = "http://192.168.1.215";

    const THEMES = ["theme-blue", "theme-orange", "theme-green", "theme-magenta"];
    const app = document.getElementById("app");

    function qp(name) {
      return new URL(window.location.href).searchParams.get(name);
    }

    function isPrivateIP(host) {
      return /^192\.168\.\d+\.\d+$/.test(host) ||
             /^10\.\d+\.\d+\.\d+$/.test(host) ||
             /^172\.(1[6-9]|2\d|3[0-1])\.\d+\.\d+$/.test(host);
    }

    function detectEnv() {
      const host = (location.hostname || "").toLowerCase();
      if (host === "localhost" || host === "127.0.0.1") return "homol";
      if (host.startsWith("dev.")) return "homol";
      if (host.startsWith("homol.")) return "homol";
      if (isPrivateIP(host)) return "homol";
      return "prod";
    }

    function apiBase(env) {
      if (env === "prod") return PROD_HOST;
      if ((location.hostname || "").toLowerCase().startsWith("dev.")) return HOMOL_HOST;
      return HOMOL_IP;
    }

    function escapeHtml(str) {
      return String(str ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatDateTime(iso) {
      if (!iso) return "-";
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return String(iso);
      const dd = String(d.getDate()).padStart(2, "0");
      const mm = String(d.getMonth() + 1).padStart(2, "0");
      const yyyy = d.getFullYear();
      const hh = String(d.getHours()).padStart(2, "0");
      const mi = String(d.getMinutes()).padStart(2, "0");
      return `${dd}/${mm}/${yyyy} ${hh}:${mi}`;
    }

    function renderSocialScreen() {
      app.className = "";
      app.innerHTML = `
        <section class="social-screen">
          <div class="social-box">
            <div>
              <div class="social-top">
                <div class="brand">
                  <img src="./assets/coasul-logo.png" alt="Coasul">
                  <div class="brand-text">COASUL</div>
                </div>

                <div class="social-tag">
                  <span>📢</span>
                  <span>Comunicado Geral</span>
                </div>
              </div>

              <div class="social-sub">
                Siga nossos canais oficiais e acompanhe as novidades da Coasul
              </div>

              <div class="social-grid">
                Quando não houver lembretes programados, este painel pode destacar os canais institucionais da cooperativa, redes sociais, site oficial e informações úteis para colaboradores e público em geral.
              </div>

              <div class="social-grid">
                <div class="social-card blue">
                  <div class="social-label">Instagram</div>
                  <div class="social-value">@coasul</div>
                  <div class="social-note">
                    Acompanhe campanhas, eventos, novidades e conteúdos do dia a dia da Coasul.
                  </div>
                </div>

                <div class="social-card orange">
                  <div class="social-label">Facebook</div>
                  <div class="social-value">/coasul</div>
                  <div class="social-note">
                    Fique por dentro dos comunicados institucionais e das principais ações da cooperativa.
                  </div>
                </div>

                <div class="social-card green">
                  <div class="social-label">Site Oficial</div>
                  <div class="social-value">coasul.com.br</div>
                  <div class="social-note">
                    Consulte notícias, informações institucionais, unidades, serviços e conteúdos atualizados.
                  </div>
                </div>
              </div>
            </div>

            <div class="social-footer">
              <div>
                COASUL — Cooperativa Agroindustrial • Informação, proximidade e inovação no campo
              </div>
              <div class="social-tag">
                <span>🌐</span>
                <span>Canais oficiais da Coasul</span>
              </div>
            </div>
          </div>
        </section>
      `;
    }

    function normalizeItems(items) {
      return (items || []).map((item, index) => ({
        titulo: item.titulo || "Lembrete",
        descricao: item.descricao || item.titulo || "Lembrete",
        criado_por: item.criado_por ?? "-",
        inicio: item.inicio || "",
        fim: item.fim || "",
        destinatario: item.destinatario && String(item.destinatario).trim() ? item.destinatario : "Comunicado geral",
        area: item.area || "-",
        funcao: item.funcao || "-",
        _theme: THEMES[index % THEMES.length]
      }));
    }

    function buildCard(item, layoutClass) {
      const topLine = `${item.destinatario} - ${formatDateTime(item.inicio)}`;
      return `
        <section class="card ${item._theme} ${layoutClass === 'layout-1' ? 'single' : ''}">
          <div class="topline">${escapeHtml(topLine)}</div>
          <div class="divider"></div>

          <div class="header">
            <div class="icon">🔔</div>
            <div class="header-title">Lembrete</div>
          </div>

          <div class="divider"></div>

          <div class="message">${escapeHtml(item.descricao || item.titulo)}</div>

          <div class="meta">
            <div><strong>${escapeHtml(item.titulo)}</strong></div>
            <div>Área: ${escapeHtml(item.area)} &nbsp;&nbsp;•&nbsp;&nbsp; Função: ${escapeHtml(item.funcao)}</div>
          </div>
        </section>
      `;
    }

    function getLayoutClass(count) {
      if (count <= 1) return "layout-1";
      if (count === 2) return "layout-2";
      if (count === 3) return "layout-3";
      return "layout-4";
    }

    let allItems = [];
    let currentPage = 0;
    let rotateTimer = null;

    function renderPage() {
      if (!allItems.length) {
        renderSocialScreen();
        return;
      }

      const perPage = Math.min(allItems.length, 4);
      const totalPages = Math.max(1, Math.ceil(allItems.length / perPage));
      if (currentPage >= totalPages) currentPage = 0;

      const start = currentPage * perPage;
      let pageItems = allItems.slice(start, start + perPage);

      if (!pageItems.length) {
        currentPage = 0;
        pageItems = allItems.slice(0, perPage);
      }

      const layoutClass = getLayoutClass(pageItems.length);
      app.className = layoutClass;

      app.innerHTML = pageItems
        .map((item, index) => {
          const themed = { ...item, _theme: THEMES[index % THEMES.length] };
          return buildCard(themed, layoutClass);
        })
        .join("");

      currentPage = (currentPage + 1) % totalPages;
    }

    async function load() {
      const cod_filial = (qp("cod_filial") || "").trim();
      const env = detectEnv();

      if (!cod_filial) {
        allItems = [];
        currentPage = 0;
        renderSocialScreen();
        setupRotation();
        return;
      }

      const base = apiBase(env);
      const url = new URL(base + API_PATH);
      url.searchParams.set("token", TOKEN);
      url.searchParams.set("cod_filial", cod_filial);

      try {
        const response = await fetch(url.toString(), { method: "GET" });
        const text = await response.text();

        if (!response.ok) {
          throw new Error(`HTTP ${response.status} ${response.statusText}`);
        }

        const looksLikeHtml = /^\s*</.test(text) || text.includes("Unable to run web object file");
        if (looksLikeHtml) {
          throw new Error("API não retornou JSON (WebSpeed).");
        }

        const json = JSON.parse(text);
        const apiItems = Array.isArray(json?.data) ? json.data : [];

        allItems = normalizeItems(apiItems);
        currentPage = 0;
        renderPage();
        setupRotation();
      } catch (error) {
        allItems = [];
        currentPage = 0;
        renderSocialScreen();
        setupRotation();
      }
    }

    function setupRotation() {
      if (rotateTimer) clearInterval(rotateTimer);
      if (allItems.length > 4) {
        rotateTimer = setInterval(renderPage, PAGE_ROTATE_MS);
      }
    }

    load();
    setInterval(load, REFRESH_EVERY_MS);
  </script>
</body>
</html>
